site_name: SSL Robotics Docs

theme:
  name: material

nav:
  - Início: index.md
  - Projeto:
      - SSL: projeto/ssl.md
      - Arquitetura: projeto/arquitetura.md
      - Roadmap: projeto/roadmap.md
  - Mecânica:
      - Visão geral: mecanica/index.md
      - Locomoção: mecanica/locomocao.md
      - Kicker: mecanica/kicker.md
      - Dribler: mecanica/dribler.md
      - Cinemática e mecanismos: mecanica/cinematica-e-mecanismos.md
      - Projeto e FEA: mecanica/projeto-e-fea.md
  - Eletrônica:
      - Visão geral: eletronica/index.md
      - Locomoção: eletronica/locomocao.md
      - Kicker: eletronica/kicker.md
      - Dribler: eletronica/dribler.md
      - Componentes: eletronica/componentes.md
      - Esquemáticos: eletronica/esquematico.md
      - PCB: eletronica/pcb.md
  - Programação:
      - Visão geral: programacao/index.md
      - Locomoção: programacao/locomocao.md
      - Kicker: programacao/kicker.md
      - Dribler: programacao/dribler.md
      - Fundamentos: programacao/fundamentos.md
      - Estratégia e visão: programacao/estrategia.md
      - Interface: programacao/interface.md
      - Filtros: programacao/filtros.md
  - Estudos:
      - Visão geral: estudos/index.md
      - Mecânica: estudos/mecanica.md
      - Eletrônica: estudos/eletronica.md
      - Programação: estudos/programacao.md
  - Referências: referencias.md

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js